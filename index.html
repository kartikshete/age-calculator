<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Age Calculator | Simple & Precise</title>
    <meta name="description" content="A simple age calculator providing precise results in years, months, and days.">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
</head>

<body>
    <main class="container">
        <header class="app-header">
            <h1>Age <span class="gradient-text">Calculator</span></h1>
            <p>Calculate your precise age instantly.</p>
        </header>

        <section class="calculator-card">
            <form id="age-form" novalidate>
                <div class="input-group">
                    <div class="input-wrapper">
                        <label for="day">Day</label>
                        <input type="number" id="day" placeholder="DD" min="1" max="31" required>
                        <span class="error-message" id="day-error"></span>
                    </div>
                    <div class="input-wrapper">
                        <label for="month">Month</label>
                        <input type="number" id="month" placeholder="MM" min="1" max="12" required>
                        <span class="error-message" id="month-error"></span>
                    </div>
                    <div class="input-wrapper">
                        <label for="year">Year</label>
                        <input type="number" id="year" placeholder="YYYY" min="1900" max="2100" required>
                        <span class="error-message" id="year-error"></span>
                    </div>
                </div>

                <div class="divider">
                    <button type="submit" id="calculate-btn" aria-label="Calculate Age">
                        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2"
                            fill="none" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <polyline points="19 12 12 19 5 12"></polyline>
                        </svg>
                    </button>
                    <hr>
                </div>
            </form>

            <div class="results">
                <div class="result-item">
                    <span class="result-value" id="res-years">--</span>
                    <span class="result-label">years</span>
                </div>
                <div class="result-item">
                    <span class="result-value" id="res-months">--</span>
                    <span class="result-label">months</span>
                </div>
                <div class="result-item">
                    <span class="result-value" id="res-days">--</span>
                    <span class="result-label">days</span>
                </div>
            </div>
        </section>

        <footer class="app-footer">
            <p>Simple Age Tracker &copy; 2026</p>
        </footer>
    </main>

    <script src="script.js"></script>
</body>

</html>
